name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Go core: vet, test, build
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: core/go.sum

      - name: Vet
        working-directory: core
        run: go vet ./...

      - name: Test
        working-directory: core
        run: go test ./... -v -race -coverprofile=coverage.txt -timeout 120s

      - name: Build
        working-directory: core
        run: go build -ldflags "-s -w" -o ../bin/probex .

      - name: Verify binary
        run: ./bin/probex --version

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: core/coverage.txt

  # Python brain: lint, test
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: brain
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Lint
        working-directory: brain
        run: python -m py_compile src/probex_brain/server.py

      - name: Test
        working-directory: brain
        run: python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found (ok for now)"

  # JS SDK: typecheck, test
  js:
    name: JS/TS SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: sdk-js
        run: npm install

      - name: Typecheck
        working-directory: sdk-js
        run: npx tsc --noEmit

  # Java SDK: compile
  java:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build SDK
        working-directory: sdk-java
        run: mvn compile -q -pl sdk

  # Docker build (no push)
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4

      - name: Build core image
        run: docker build -t probex:ci-core -f docker/Dockerfile.core .

      - name: Verify image
        run: docker run --rm probex:ci-core --version
