version: 2

project_name: probex

before:
  hooks:
    - cd core && go mod tidy

builds:
  - id: probex
    dir: core
    main: .
    binary: probex
    ldflags:
      - -s -w
      - -X github.com/mkaganm/probex/cmd.version={{.Version}}
      - -X github.com/mkaganm/probex/cmd.commit={{.Commit}}
      - -X github.com/mkaganm/probex/cmd.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - docs/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: mkaganm
    name: probex
  draft: false
  prerelease: auto
  name_template: "PROBEX {{.Version}}"
  header: |
    ## What's Changed

    Zero-Test API Intelligence Engine — discover, learn, and autonomously test your APIs.

    ### Installation

    ```bash
    # macOS / Linux
    curl -sSL https://github.com/mkaganm/probex/releases/download/{{.Tag}}/probex_{{.Version}}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz | tar xz
    sudo mv probex /usr/local/bin/

    # Docker
    docker pull probex/probex:{{.Version}}
    ```
